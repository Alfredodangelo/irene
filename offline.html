<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Irene Gipsy Tattoo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root {
            --gold: #D4AF37;
            --bg: #0a0a0a;
            --text: #e0e0e0;
            --text-muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            background-image: radial-gradient(ellipse at top, rgba(212,175,55,0.04) 0%, transparent 60%);
        }
        .offline-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 32px;
            opacity: 0.6;
        }
        .offline-icon svg {
            width: 100%;
            height: 100%;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 16px;
        }
        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 360px;
            margin-bottom: 32px;
        }
        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 32px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .retry-btn:hover, .retry-btn:active {
            background: var(--gold);
            color: var(--bg);
        }
        .gold-line {
            width: 60px;
            height: 1px;
            background: var(--gold);
            opacity: 0.3;
            margin: 24px 0;
        }
    </style>
</head>
<body>
    <div class="offline-icon">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
            <path d="M35 55 Q50 35 65 55" stroke="#D4AF37" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M28 48 Q50 24 72 48" stroke="#D4AF37" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
            <path d="M42 62 Q50 50 58 62" stroke="#D4AF37" stroke-width="2" fill="none" stroke-linecap="round"/>
            <circle cx="50" cy="70" r="3" fill="#D4AF37"/>
            <!-- Barra diagonale "no signal" -->
            <line x1="25" y1="75" x2="75" y2="25" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
        </svg>
    </div>

    <h1>Sei offline</h1>
    <p>Non c'e' connessione a Internet. Controlla la rete e riprova. Le pagine gia' visitate potrebbero essere ancora disponibili.</p>

    <div class="gold-line"></div>

    <button class="retry-btn" onclick="window.location.reload()">
        Riprova
    </button>

    <script>
        // Auto-retry quando torna la connessione
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
